# SkillBridge Bank - Loan Management Application

## Overview

SkillBridge Bank is a custom ServiceNow application designed to streamline the end-to-end loan processing lifecycle. The application enables users to submit loan requests, manage loan processing tasks, track approvals, monitor service level agreements, automate notifications, and integrate data from external systems.

The solution was built using ServiceNow platform capabilities including custom tables, business rules, client-side scripting, workflow automation, service catalog, data imports, and integrations.

---

## Business Objectives

* Centralize loan request management
* Improve loan processing efficiency
* Automate task assignment and notifications
* Track SLA compliance
* Reduce manual data entry through imports
* Provide self-service request capabilities
* Support integration with external banking systems

